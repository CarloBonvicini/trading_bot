<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Trading Bot Lab{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  </head>
  <body>
    <div class="ambient ambient-left"></div>
    <div class="ambient ambient-right"></div>
    <div class="panel-backdrop" id="panel-backdrop" hidden></div>
    <header class="shell-header">
      <a class="brand" href="{{ url_for('index') }}">
        <span class="brand-mark">TB</span>
        <div>
          <p class="eyebrow">localhost lab</p>
          <h1>Trading Bot Research</h1>
        </div>
      </a>
      <nav class="shell-nav">
        <a href="{{ url_for('index') }}">Nuovo backtest</a>
      </nav>
    </header>

    <main class="page-shell">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          <section class="flash-stack">
            {% for category, message in messages %}
              <article class="flash flash-{{ category }}">{{ message }}</article>
            {% endfor %}
          </section>
        {% endif %}
      {% endwith %}
      {% block content %}{% endblock %}
    </main>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const expandablePanels = Array.from(document.querySelectorAll("[data-expandable-panel]"));
        const backdrop = document.getElementById("panel-backdrop");
        let activePanel = null;

        function isInteractiveTarget(target) {
          return Boolean(
            target.closest("a, button, input, select, textarea, summary, [data-no-expand]")
          );
        }

        function closeActivePanel() {
          if (!activePanel) {
            return;
          }

          activePanel.classList.remove("is-expanded");
          activePanel.setAttribute("aria-expanded", "false");
          document.body.classList.remove("panel-expanded");
          backdrop.hidden = true;
          backdrop.classList.remove("is-visible");
          activePanel = null;
        }

        function openPanel(panel) {
          if (activePanel === panel) {
            return;
          }

          closeActivePanel();
          activePanel = panel;
          panel.classList.add("is-expanded");
          panel.setAttribute("aria-expanded", "true");
          document.body.classList.add("panel-expanded");
          backdrop.hidden = false;
          requestAnimationFrame(() => backdrop.classList.add("is-visible"));
        }

        expandablePanels.forEach((panel) => {
          panel.setAttribute("aria-expanded", "false");
          panel.setAttribute("title", "Clicca per espandere");

          const closeButton = document.createElement("button");
          closeButton.type = "button";
          closeButton.className = "panel-expand-close";
          closeButton.dataset.noExpand = "true";
          closeButton.setAttribute("aria-label", "Chiudi pannello espanso");
          closeButton.textContent = "Chiudi";
          closeButton.addEventListener("click", (event) => {
            event.preventDefault();
            event.stopPropagation();
            closeActivePanel();
          });
          panel.appendChild(closeButton);

          panel.addEventListener("click", (event) => {
            if (isInteractiveTarget(event.target)) {
              return;
            }

            if (panel.classList.contains("is-expanded")) {
              closeActivePanel();
              return;
            }

            openPanel(panel);
          });
        });

        backdrop.addEventListener("click", closeActivePanel);
        document.addEventListener("keydown", (event) => {
          if (event.key === "Escape") {
            closeActivePanel();
          }
        });
      });
    </script>
  </body>
</html>
