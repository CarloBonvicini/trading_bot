<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Trading Bot Lab{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  </head>
  <body>
    <div class="ambient ambient-left"></div>
    <div class="ambient ambient-right"></div>
    <header class="shell-header">
      <a class="brand" href="{{ url_for('index') }}">
        <span class="brand-mark">TB</span>
        <div>
          <p class="eyebrow">localhost lab</p>
          <h1>Trading Bot Research</h1>
        </div>
      </a>
      <nav class="shell-nav">
        <a href="{{ url_for('index') }}">Nuovo backtest</a>
      </nav>
    </header>

    <main class="page-shell">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          <section class="flash-stack">
            {% for category, message in messages %}
              <article class="flash flash-{{ category }}">{{ message }}</article>
            {% endfor %}
          </section>
        {% endif %}
      {% endwith %}
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
